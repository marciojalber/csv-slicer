<br/>
<div class="h5">
  FILES TARGET
  <span v-if="exposed.filesTarget.length">({{exposed.filesTarget.length}})</span>
</div>
<div class="card mb-2" style="border: 1px solid black">
  <div class="card-body">
    <div v-if="!exposed.filesTarget.length">
      <span class="chip">NO FILE PRODUCED</span>
    </div>
    <div v-for="file in exposed.filesTarget">
      <v-icon class="icon icon-check text-success mr-2"></v-icon>
      {{ file }}
    </div>
  </div>
</div>
